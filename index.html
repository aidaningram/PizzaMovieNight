<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#111019" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Pizza</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <section class="loading-view" aria-live="polite">
        <div class="brand-mark"><img class="brand-logo" src="icon.svg" alt="" /></div>
        <h1>Pizza</h1>
        <p>Loading...</p>
      </section>
    </div>

    <template id="login-template">
      <main class="login-screen">
        <section class="login-copy">
          <div class="brand-mark"><img class="brand-logo" src="icon.svg" alt="" /></div>
          <h1>Pizza</h1>
          <p>The family wheel lives here.</p>
        </section>

        <form id="family-login-form" class="panel form-stack">
          <div class="segmented" role="tablist" aria-label="Account action">
            <button type="button" class="segment active" data-auth-mode="signin">Sign in</button>
            <button type="button" class="segment" data-auth-mode="signup">Create</button>
          </div>
          <label id="name-field-wrap" hidden>
            Name
            <input id="family-name-input" autocomplete="name" required maxlength="32" placeholder="Your name" />
          </label>
          <label>
            Email
            <input id="account-email-input" type="email" autocomplete="email" required placeholder="you@example.com" />
          </label>
          <label>
            Account password
            <input id="account-password-input" type="password" autocomplete="current-password" required minlength="6" placeholder="At least 6 characters" />
          </label>
          <label id="confirm-password-field-wrap" hidden>
            Confirm password
            <input id="confirm-password-input" type="password" autocomplete="new-password" minlength="6" placeholder="Re-enter password" />
          </label>
          <label id="family-password-field-wrap" hidden>
            Family password
            <input id="family-password-input" type="password" autocomplete="current-password" required placeholder="Family password" />
          </label>
          <button id="reset-password-button" class="text-action" type="button">Forgot password?</button>
          <button class="primary-action" type="submit">Enter</button>
          <p id="login-note" class="helper-text" aria-live="polite"></p>
        </form>
      </main>
    </template>

    <template id="home-template">
      <main class="page page-home">
        <header class="page-header">
          <div class="family-title">The Ingram Family</div>
          <div class="menu-slot"></div>
        </header>

        <section class="welcome-panel">
          <h1 id="welcome-title"></h1>
          <div class="home-actions">
            <button id="go-wheel-button" class="primary-action" type="button">Go to wheel</button>
            <button id="go-list-button" class="secondary-action" type="button">Movie List</button>
            <button id="go-search-button" class="secondary-action" type="button">Find Movies</button>
            <button id="go-rankings-button" class="secondary-action" type="button">Rankings</button>
            <button id="go-game-button" class="secondary-action" type="button">Pizza Arena</button>
          </div>
        </section>
      </main>
    </template>

    <template id="wheel-template">
      <main class="page">
        <header class="page-header">
          <div class="family-title">The Ingram Family</div>
          <div class="menu-slot"></div>
        </header>

        <section class="wheel-page-stage">
          <canvas id="wheel-canvas" width="760" height="760" aria-label="Current movie wheel"></canvas>
          <div class="wheel-pointer" aria-hidden="true"></div>
          <button id="spin-button" class="spin-button" type="button">Spin</button>
        </section>

        <section id="spin-status" class="spin-status" hidden></section>

        <section id="winner-panel" class="winner-panel" hidden>
          <p class="eyebrow">Tonight's pick</p>
          <h2 id="winner-title"></h2>
          <p id="winner-meta"></p>
          <button id="confirm-picked" class="primary-action" type="button">Remove from wheel</button>
        </section>

        <section id="empty-wheel-panel" class="panel empty-wheel-panel" hidden>
          <h2>The wheel is empty.</h2>
          <p>Add picks for the next pizza movie night.</p>
          <button id="go-add-button" class="primary-action" type="button">Add movies to wheel</button>
        </section>
      </main>
    </template>

    <template id="add-template">
      <main class="page">
        <header class="page-header">
          <div class="family-title">The Ingram Family</div>
          <div class="menu-slot"></div>
        </header>

        <section class="panel form-stack">
          <p class="eyebrow">New wheel</p>
          <h1 class="page-title">Add movies</h1>
          <p class="helper-text">Pick from the shared list or add a new movie.</p>
        </section>

        <section class="panel form-stack">
          <h2>Add from Movie List</h2>
          <div id="candidate-list" class="movie-list"></div>
        </section>

        <form id="custom-wheel-form" class="panel form-stack">
          <h2>Add your own movie</h2>
          <label>
            Movie title
            <input id="custom-movie-title" required maxlength="80" placeholder="Movie title" />
          </label>
          <button class="primary-action" type="submit">Add to wheel</button>
        </form>
      </main>
    </template>

    <template id="movie-list-template">
      <main class="page">
        <header class="page-header">
          <div class="family-title">The Ingram Family</div>
          <div class="menu-slot"></div>
        </header>

        <section class="panel form-stack">
          <p class="eyebrow">Future picks</p>
          <h1 class="page-title">Movie List</h1>
          <p class="helper-text">A shared parking lot for movies anyone might want later.</p>
        </section>

        <form id="movie-list-form" class="panel form-stack">
          <label>
            Movie title
            <input id="movie-list-title" required maxlength="80" placeholder="Add a future movie" />
          </label>
          <button class="primary-action" type="submit">Add to Movie List</button>
        </form>

        <section id="movie-list-items" class="movie-list"></section>
      </main>
    </template>

    <template id="search-template">
      <main class="page">
        <header class="page-header">
          <div class="family-title">The Ingram Family</div>
          <div class="menu-slot"></div>
        </header>

        <section class="panel form-stack">
          <p class="eyebrow">OMDb lookup</p>
          <h1 class="page-title">Find Movies</h1>
          <p class="helper-text">Search for movies and add them to the list or wheel.</p>
        </section>

        <form id="movie-search-form" class="panel form-stack">
          <label>
            Movie search
            <input id="movie-search-input" maxlength="80" placeholder="Search by title or leave blank for genre" />
          </label>
          <div class="filter-grid">
            <label>
              Rating
              <select id="movie-rating-filter">
                <option value="">Any rating</option>
                <option>G</option>
                <option>PG</option>
                <option>PG-13</option>
                <option>R</option>
              </select>
            </label>
            <label>
              Genre
              <select id="movie-genre-filter">
                <option value="">Any genre</option>
                <option>Action</option>
                <option>Adventure</option>
                <option>Animation</option>
                <option>Comedy</option>
                <option>Drama</option>
                <option>Family</option>
                <option>Fantasy</option>
                <option>Mystery</option>
                <option>Sci-Fi</option>
              </select>
            </label>
          </div>
          <button class="primary-action" type="submit">Search</button>
          <p id="movie-search-note" class="helper-text" aria-live="polite"></p>
        </form>

        <section id="movie-search-results" class="search-results"></section>
      </main>
    </template>

    <template id="movie-detail-template">
      <main class="page">
        <header class="page-header">
          <button id="movie-detail-back" class="back-button" type="button" aria-label="Go back">‹</button>
          <div class="menu-slot"></div>
        </header>

        <section id="movie-detail-content"></section>
      </main>
    </template>

    <template id="rankings-template">
      <main class="page">
        <header class="page-header">
          <div class="family-title">The Ingram Family</div>
          <div class="menu-slot"></div>
        </header>

        <section class="panel form-stack">
          <p class="eyebrow">Past picks</p>
          <h1 class="page-title">Rankings</h1>
          <p class="helper-text">Rate movies after they leave the wheel.</p>
        </section>

        <section id="rankings-list" class="rankings-list"></section>
      </main>
    </template>

    <template id="members-template">
      <main class="page">
        <header class="page-header">
          <div class="family-title">The Ingram Family</div>
          <div class="menu-slot"></div>
        </header>

        <section class="panel form-stack">
          <p class="eyebrow">Family group</p>
          <h1 class="page-title">Members</h1>
          <p class="helper-text">Remove old test accounts so only current family members are counted for spin readiness.</p>
        </section>

        <section id="members-list" class="movie-list"></section>
      </main>
    </template>

    <template id="game-template">
      <main class="page game-page">
        <header class="page-header">
          <div class="family-title">The Ingram Family</div>
          <div class="menu-slot"></div>
        </header>

        <section class="pizza-game-shell">
          <section id="game-menu-panel" class="game-menu-panel">
            <div class="game-rules-card">
              <p class="eyebrow">Pizza Arena</p>
              <h1 class="page-title">Pizza Arena</h1>
              <p class="helper-text">Collect toppings, dodge zombies, and outscore the family.</p>
              <div class="game-rules-grid">
                <div><i class="rule-icon pepperoni-icon"></i><strong>Pepperoni</strong><span>Ammo + 100 XP</span></div>
                <div><i class="rule-icon mushroom-icon"></i><strong>Mushroom</strong><span>Splash shots + 300 XP</span></div>
                <div><i class="rule-icon basil-icon"></i><strong>Basil</strong><span>Rapid short shots + 300 XP</span></div>
                <div><i class="rule-icon meatball-icon"></i><strong>Meatball</strong><span>Slow, immune contact KO</span></div>
                <div><i class="rule-icon zombie-icon"></i><strong>Zombies</strong><span>Touch = defeat, KO = 300 XP</span></div>
                <div><i class="rule-icon match-icon"></i><strong>Matches</strong><span>2 min, player KO = 1000 XP</span></div>
              </div>
            </div>
            <div class="game-menu-actions">
              <button id="free-play-button" class="secondary-action" type="button">Free Play</button>
              <button id="start-match-button" class="primary-action" type="button">Start Match</button>
              <button id="spectate-button" class="primary-action" type="button" hidden>Spectate</button>
              <p id="match-queue-note" class="helper-text"></p>
            </div>
          </section>

          <section id="game-play-panel" class="game-play-panel" hidden>
          <section class="pizza-game-topbar">
            <div>
              <p class="eyebrow">Pizza Arena</p>
              <h1 class="page-title">Pizza Arena</h1>
            </div>
            <div id="game-connection-status" class="game-status-pill">Loading</div>
          </section>

          <ol id="match-leaderboard" class="match-leaderboard" hidden></ol>

          <section class="pizza-arena-wrap">
            <canvas id="game-canvas" width="960" height="1120" aria-label="Pizza Arena game"></canvas>
            <div id="arena-status" class="arena-status">Loading</div>
            <div id="game-overlay" class="game-overlay" hidden>
              <h2>Pizza Arena</h2>
              <p>Joining the family arena...</p>
            </div>
            <section id="match-end-panel" class="match-end-panel" hidden>
              <p class="eyebrow">Match Complete</p>
              <h2>Final Scores</h2>
              <ol id="final-match-leaderboard" class="match-leaderboard final"></ol>
              <div class="match-end-actions">
                <button id="return-game-menu-button" class="secondary-action" type="button">Return to menu</button>
                <button id="end-free-play-button" class="primary-action" type="button">Free Play</button>
              </div>
            </section>
          </section>

          <section class="pizza-game-hud">
            <button id="queue-match-button" class="leaderboard-button" type="button">Queue Match</button>
            <button id="shoot-button" class="shoot-button" type="button">Shoot pizza</button>
          </section>

          <section class="mobile-controls" aria-label="Game controls">
            <div id="joystick" class="joystick" aria-label="Movement joystick">
              <div id="joystick-thumb" class="joystick-thumb"></div>
            </div>
            <button id="mobile-shoot-button" class="fire-button" type="button">Fire</button>
          </section>
          </section>
        </section>
      </main>
    </template>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="app-v35.js"></script>
  </body>
</html>
