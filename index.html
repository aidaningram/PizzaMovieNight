<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#fff7e7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Pizza</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <section class="loading-view" aria-live="polite">
        <div class="brand-mark"><img class="brand-logo" src="assets/pizza-logo.png" alt="" /></div>
        <h1>Pizza</h1>
        <p>Loading...</p>
      </section>
    </div>

    <template id="login-template">
      <main class="login-screen">
        <section class="login-copy">
          <div class="brand-mark"><img class="brand-logo" src="assets/pizza-logo.png" alt="" /></div>
          <h1>Pizza</h1>
          <p>The family wheel lives here.</p>
        </section>

        <form id="family-login-form" class="panel form-stack">
          <div class="segmented" role="tablist" aria-label="Account action">
            <button type="button" class="segment active" data-auth-mode="signin">Sign in</button>
            <button type="button" class="segment" data-auth-mode="signup">Create</button>
          </div>
          <label id="name-field-wrap" hidden>
            Name
            <input id="family-name-input" autocomplete="name" required maxlength="32" placeholder="Your name" />
          </label>
          <label>
            Email
            <input id="account-email-input" type="email" autocomplete="email" required placeholder="you@example.com" />
          </label>
          <label>
            Account password
            <input id="account-password-input" type="password" autocomplete="current-password" required minlength="6" placeholder="At least 6 characters" />
          </label>
          <label id="confirm-password-field-wrap" hidden>
            Confirm password
            <input id="confirm-password-input" type="password" autocomplete="new-password" minlength="6" placeholder="Re-enter password" />
          </label>
          <label id="family-password-field-wrap" hidden>
            Family password
            <input id="family-password-input" type="password" autocomplete="current-password" required placeholder="Family password" />
          </label>
          <button id="reset-password-button" class="text-action" type="button">Forgot password?</button>
          <button class="primary-action" type="submit">Enter</button>
          <p id="login-note" class="helper-text" aria-live="polite"></p>
        </form>
      </main>
    </template>

    <template id="home-template">
      <main class="page page-home">
        <header class="page-header">
          <div class="family-title">The Ingram Family</div>
          <div class="menu-slot"></div>
        </header>

        <section class="welcome-panel">
          <div class="home-hero-copy">
            <h1 id="welcome-title"></h1>
            <img class="home-hero-image" src="assets/home/hero-movie-pizza.png" alt="" />
          </div>
          <button id="go-wheel-button" class="primary-action home-wheel-action" type="button"><span class="wheel-mini" aria-hidden="true"></span><span>Go to wheel</span></button>
        </section>

        <section class="home-feature-section">
          <div class="home-actions">
            <button id="go-list-button" class="secondary-action home-card-action" type="button"><span class="home-card-icon"><img src="assets/home/movie-list-icon.png" alt="" /></span><span><strong>Movie List</strong><small>See our saved movies</small></span></button>
            <button id="go-search-button" class="secondary-action home-card-action" type="button"><span class="home-card-icon"><img src="assets/home/find-icon.png" alt="" /></span><span><strong>Find Movies</strong><small>Discover the perfect pick</small></span></button>
            <button id="go-rankings-button" class="secondary-action home-card-action" type="button"><span class="home-card-icon"><img src="assets/home/rankings-icon.png" alt="" /></span><span><strong>Rankings</strong><small>See family favorites</small></span></button>
            <button id="go-game-button" class="secondary-action home-card-action" type="button"><span class="home-card-icon"><img src="assets/home/arena-icon.png" alt="" /></span><span><strong>Pizza Arena</strong><small>Fun challenges & mini games</small></span></button>
          </div>
          <p class="home-tagline">Grab a slice. Press play.</p>
        </section>
        <img class="home-bottom-art" src="assets/home/bottom-bar.png" alt="" />
      </main>
    </template>

    <template id="wheel-template">
      <main class="page">
        <header class="page-header">
          <div class="family-title">The Ingram Family</div>
          <div class="menu-slot"></div>
        </header>

        <section class="wheel-page-stage">
          <canvas id="wheel-canvas" width="760" height="760" aria-label="Current movie wheel"></canvas>
          <div class="wheel-pointer" aria-hidden="true"></div>
          <button id="spin-button" class="spin-button" type="button">Spin</button>
        </section>

        <section id="spin-status" class="spin-status" hidden></section>

        <button id="open-clear-wheel" class="secondary-action clear-wheel-trigger" type="button">Clear Wheel</button>

        <section id="winner-panel" class="winner-panel" hidden>
          <p class="eyebrow">Tonight's pick</p>
          <h2 id="winner-title"></h2>
          <p id="winner-meta"></p>
          <button id="confirm-picked" class="primary-action" type="button">Remove from wheel</button>
        </section>

        <section id="empty-wheel-panel" class="panel empty-wheel-panel" hidden>
          <h2>The wheel is empty.</h2>
          <p>Add picks for the next pizza movie night.</p>
          <button id="go-add-button" class="primary-action" type="button">Add movies to wheel</button>
        </section>
      </main>
    </template>

    <template id="add-template">
      <main class="page">
        <header class="page-header">
          <div class="family-title">The Ingram Family</div>
          <div class="menu-slot"></div>
        </header>

        <section class="panel form-stack">
          <p class="eyebrow">New wheel</p>
          <h1 class="page-title">Add movies</h1>
          <p class="helper-text">Pick from the shared list or add a new movie.</p>
        </section>

        <section class="panel form-stack">
          <h2>Add from Movie List</h2>
          <div id="candidate-list" class="movie-list"></div>
        </section>

        <form id="custom-wheel-form" class="panel form-stack">
          <h2>Add your own movie</h2>
          <label>
            Movie title
            <input id="custom-movie-title" required maxlength="80" placeholder="Movie title" />
          </label>
          <button class="primary-action" type="submit">Add to wheel</button>
        </form>
      </main>
    </template>

    <template id="movie-list-template">
      <main class="page">
        <header class="page-header">
          <div class="family-title">The Ingram Family</div>
          <div class="menu-slot"></div>
        </header>

        <section class="panel form-stack">
          <p class="eyebrow">Future picks</p>
          <h1 class="page-title">Movie List</h1>
          <p class="helper-text">A shared parking lot for movies anyone might want later.</p>
        </section>

        <form id="movie-list-form" class="panel form-stack">
          <label>
            Movie title
            <input id="movie-list-title" required maxlength="80" placeholder="Add a future movie" />
          </label>
          <button class="primary-action" type="submit">Add to Movie List</button>
        </form>

        <section id="movie-list-items" class="movie-list"></section>
      </main>
    </template>

    <template id="search-template">
      <main class="page">
        <header class="page-header">
          <div class="family-title">The Ingram Family</div>
          <div class="menu-slot"></div>
        </header>

        <section class="panel form-stack">
          <p class="eyebrow">OMDb lookup</p>
          <h1 class="page-title">Find Movies</h1>
          <p class="helper-text">Search for movies and add them to the list or wheel.</p>
        </section>

        <form id="movie-search-form" class="panel form-stack">
          <label>
            Movie search
            <input id="movie-search-input" maxlength="80" placeholder="Search by title or leave blank for genre" />
          </label>
          <div class="filter-grid">
            <label>
              Rating
              <select id="movie-rating-filter">
                <option value="">Any rating</option>
                <option>G</option>
                <option>PG</option>
                <option>PG-13</option>
                <option>R</option>
              </select>
            </label>
            <label>
              Genre
              <select id="movie-genre-filter">
                <option value="">Any genre</option>
                <option>Action</option>
                <option>Adventure</option>
                <option>Animation</option>
                <option>Comedy</option>
                <option>Drama</option>
                <option>Family</option>
                <option>Fantasy</option>
                <option>Mystery</option>
                <option>Sci-Fi</option>
              </select>
            </label>
          </div>
          <button class="primary-action" type="submit">Search</button>
          <p id="movie-search-note" class="helper-text" aria-live="polite"></p>
        </form>

        <section id="movie-search-results" class="search-results"></section>
      </main>
    </template>

    <template id="movie-detail-template">
      <main class="page">
        <header class="page-header">
          <button id="movie-detail-back" class="back-button" type="button" aria-label="Go back">‹</button>
          <div class="menu-slot"></div>
        </header>

        <section id="movie-detail-content"></section>
      </main>
    </template>

    <template id="rankings-template">
      <main class="page">
        <header class="page-header">
          <div class="family-title">The Ingram Family</div>
          <div class="menu-slot"></div>
        </header>

        <section class="panel form-stack">
          <p class="eyebrow">Past picks</p>
          <h1 class="page-title">Rankings</h1>
          <p class="helper-text">Rate movies after they leave the wheel.</p>
        </section>

        <section id="rankings-list" class="rankings-list"></section>
      </main>
    </template>

    <template id="members-template">
      <main class="page">
        <header class="page-header">
          <div class="family-title">The Ingram Family</div>
          <div class="menu-slot"></div>
        </header>

        <section class="panel form-stack">
          <p class="eyebrow">Family group</p>
          <h1 class="page-title">Members</h1>
          <p class="helper-text">Remove old test accounts so only current family members are counted for spin readiness.</p>
        </section>

        <section id="members-list" class="movie-list"></section>
      </main>
    </template>

    <template id="design-system-template">
      <main class="design-system-page">
        <header class="design-system-hero">
          <img src="assets/pizza-logo.png" alt="Pizza logo" />
          <div>
            <p class="eyebrow">Private brand guide</p>
            <h1>Pizza Design System</h1>
            <p>This hidden page documents the colors, type, logo usage, and reusable UI pieces for the Pizza app.</p>
          </div>
        </header>

        <section class="design-section">
          <h2>Logo</h2>
          <div class="logo-spec-grid">
            <div class="logo-tile dark"><img src="assets/pizza-logo.png" alt="" /></div>
            <div class="logo-tile light"><img src="assets/pizza-logo.png" alt="" /></div>
            <div class="spec-copy">
              <p><strong>Primary mark:</strong> illustrated pizza slice on deep plum or warm cream surfaces.</p>
              <p><strong>App icon:</strong> pizza slice inside a rounded plum square with a soft warm shadow.</p>
              <p><strong>Minimum size:</strong> 44px in app chrome, 64px for brand moments.</p>
            </div>
          </div>
        </section>

        <section class="design-section">
          <h2>Colors</h2>
          <div class="swatch-grid">
            <div class="swatch" style="--swatch:#fff7e7"><span></span><strong>Warm Cream</strong><code>#fff7e7</code></div>
            <div class="swatch" style="--swatch:#341735"><span></span><strong>Plum Ink</strong><code>#341735</code></div>
            <div class="swatch" style="--swatch:#ef463e"><span></span><strong>Sauce Red</strong><code>#ef463e</code></div>
            <div class="swatch" style="--swatch:#ffc94d"><span></span><strong>Cheese Gold</strong><code>#ffc94d</code></div>
            <div class="swatch" style="--swatch:#ff8b4d"><span></span><strong>Crust Orange</strong><code>#ff8b4d</code></div>
            <div class="swatch" style="--swatch:#f7e8c9"><span></span><strong>Dough Card</strong><code>#f7e8c9</code></div>
          </div>
        </section>

        <section class="design-section">
          <h2>Typography</h2>
          <div class="type-grid">
            <div><p class="type-display">Baloo 2</p><p>Used for headlines, buttons, navigation, and playful emphasis.</p></div>
            <div><p class="type-body">Nunito</p><p>Used for body copy, helper text, labels, and form content.</p></div>
          </div>
        </section>

        <section class="design-section">
          <h2>Components</h2>
          <div class="component-grid">
            <button class="primary-action" type="button">Primary Button</button>
            <button class="secondary-action" type="button">Secondary Button</button>
            <div class="panel form-stack"><p class="eyebrow">Panel</p><h3>Simple content card</h3><p class="helper-text">Warm cards, plum text, soft shadows, and rounded corners.</p></div>
          </div>
        </section>
      </main>
    </template>

    <template id="game-template">
      <main class="page game-page">
        <header class="page-header">
          <div class="family-title">The Ingram Family</div>
          <div class="menu-slot"></div>
        </header>

        <section class="pizza-game-shell">
          <section id="game-menu-panel" class="game-menu-panel">
            <div class="game-rules-card">
              <p class="eyebrow">Pizza Arena</p>
              <h1 class="page-title">Pizza Arena</h1>
              <p class="helper-text">Collect toppings, dodge zombies, and outscore the family.</p>
              <div class="game-rules-grid">
                <div><canvas class="rule-icon" width="64" height="64" data-rule-icon="pepperoni" aria-hidden="true"></canvas><strong>Pepperoni</strong><span>Ammo + 100 XP</span></div>
                <div><canvas class="rule-icon" width="64" height="64" data-rule-icon="mushroom" aria-hidden="true"></canvas><strong>Mushroom</strong><span>Splash shots + 300 XP</span></div>
                <div><canvas class="rule-icon" width="64" height="64" data-rule-icon="basil" aria-hidden="true"></canvas><strong>Basil</strong><span>Rapid short shots + 300 XP</span></div>
                <div><canvas class="rule-icon" width="64" height="64" data-rule-icon="meatball" aria-hidden="true"></canvas><strong>Meatball</strong><span>Slow, immune contact KO</span></div>
                <div><canvas class="rule-icon" width="64" height="64" data-rule-icon="zombie" aria-hidden="true"></canvas><strong>Zombies</strong><span>Touch = defeat, KO = 300 XP</span></div>
                <div><canvas class="rule-icon" width="64" height="64" data-rule-icon="match" aria-hidden="true"></canvas><strong>Matches</strong><span>2 min, player KO = 1000 XP</span></div>
              </div>
            </div>
            <div class="game-menu-actions">
              <button id="free-play-button" class="secondary-action" type="button">Free Play</button>
              <button id="survival-button" class="secondary-action" type="button">Zombie Survival</button>
              <button id="start-match-button" class="primary-action" type="button">Start Match</button>
              <button id="spectate-button" class="primary-action" type="button" hidden>Spectate</button>
              <button id="test-sound-button" class="secondary-action game-test-sound-button" type="button">Test Sound</button>
              <p id="game-audio-test-note" class="helper-text game-audio-test-note" aria-live="polite"></p>
              <p id="match-queue-note" class="helper-text"></p>
            </div>
            <section id="game-records-panel" class="game-records-panel">
              <div>
                <p class="eyebrow">Free Play Records</p>
                <ol id="freeplay-records-list" class="records-list"></ol>
              </div>
              <div>
                <p class="eyebrow">Match Records</p>
                <ol id="match-records-list" class="records-list"></ol>
              </div>
            </section>
          </section>

          <section id="game-play-panel" class="game-play-panel" hidden>
            <section class="game-play-header">
              <button id="game-back-menu-button" class="game-back-button" type="button" aria-label="Back to Pizza Arena menu">←</button>
              <section id="ammo-display" class="ammo-display" aria-live="polite">
                <canvas id="ammo-icon" class="ammo-icon" width="64" height="64" aria-hidden="true"></canvas>
                <span>Ammo: <strong id="ammo-count">0</strong></span>
              </section>
              <section id="survival-lives" class="survival-lives" aria-label="Survival lives" hidden></section>
            </section>
            <section class="pizza-game-topbar">
              <div>
                <p class="eyebrow">Pizza Arena</p>
                <h1 class="page-title">Pizza Arena</h1>
              </div>
              <div id="game-connection-status" class="game-status-pill">Loading</div>
            </section>

            <section class="pizza-arena-wrap">
              <canvas id="game-canvas" width="960" height="1120" aria-label="Pizza Arena game"></canvas>
              <div id="arena-status" class="arena-status">Loading</div>
              <div id="game-overlay" class="game-overlay" hidden>
                <h2>Pizza Arena</h2>
                <p>Joining the family arena...</p>
              </div>
              <section id="match-end-panel" class="match-end-panel" hidden>
                <p class="eyebrow">Match Complete</p>
                <h2>Final Scores</h2>
                <ol id="final-match-leaderboard" class="match-leaderboard final"></ol>
                <div class="match-end-actions">
                  <button id="return-game-menu-button" class="secondary-action" type="button">Return to menu</button>
                  <button id="end-free-play-button" class="primary-action" type="button">Free Play</button>
                </div>
              </section>
              <section id="survival-end-panel" class="match-end-panel survival-end-panel" hidden>
                <p class="eyebrow">Zombie Survival</p>
                <h2>Game Over</h2>
                <p id="survival-end-summary" class="helper-text">You made it to Wave 1.</p>
                <div class="match-end-actions">
                  <button id="survival-return-menu-button" class="secondary-action" type="button">Return to menu</button>
                  <button id="survival-play-again-button" class="primary-action" type="button">Play again</button>
                </div>
              </section>
            </section>

            <ol id="match-leaderboard" class="match-leaderboard" hidden></ol>
            <section id="survival-wave-strip" class="survival-wave-strip" hidden>Wave 1</section>

            <section class="pizza-game-hud">
              <button id="shoot-button" class="shoot-button" type="button">Shoot pizza</button>
            </section>

            <section class="mobile-controls" aria-label="Game controls">
              <div id="joystick" class="joystick" aria-label="Movement joystick">
                <div id="joystick-thumb" class="joystick-thumb"></div>
              </div>
              <button id="mobile-shoot-button" class="fire-button" type="button">Fire</button>
            </section>
            <section id="spectator-panel" class="spectator-panel" hidden>You are a spectator</section>
          </section>
        </section>
      </main>
    </template>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="app-v35.js?v=bridge-2"></script>
  </body>
</html>
