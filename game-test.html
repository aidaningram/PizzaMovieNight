<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#111019" />
    <title>Pizza Arena Test</title>
    <link rel="stylesheet" href="game-test.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="game-topbar">
        <a class="logo-link" href="./" aria-label="Back to Pizza">
          <img src="icon.svg" alt="" />
        </a>
        <div>
          <p class="eyebrow">Test game</p>
          <h1>Pizza Arena</h1>
        </div>
        <div id="connection-status" class="status-pill">Loading</div>
      </header>

      <section class="arena-wrap">
        <canvas id="game-canvas" width="960" height="760" aria-label="Pizza Arena game"></canvas>
        <div id="arena-status" class="arena-status">Loading</div>
        <button id="leaderboard-button" class="arena-leaderboard-button" type="button">Leaderboard</button>
        <div id="game-overlay" class="game-overlay">
          <h2>Pizza Arena</h2>
          <p>Sign into the main Pizza app first, then open this page to join the test arena.</p>
        </div>
        <section id="leaderboard-panel" class="leaderboard-panel" hidden>
          <div class="leaderboard-header">
            <div>
              <p class="eyebrow">Pizza Arena</p>
              <h2>Leaderboard</h2>
            </div>
            <button id="close-leaderboard" type="button" aria-label="Close leaderboard">Close</button>
          </div>
          <ol id="leaderboard-list" class="leaderboard-list"></ol>
        </section>
      </section>

      <section class="game-hud">
        <button id="shoot-button" class="shoot-button" type="button">Shoot pizza</button>
      </section>

      <section class="mobile-controls" aria-label="Game controls">
        <div id="joystick" class="joystick" aria-label="Movement joystick">
          <div id="joystick-thumb" class="joystick-thumb"></div>
        </div>
        <button id="mobile-shoot-button" class="fire-button" type="button">Fire</button>
      </section>
    </main>

    <script type="module" src="game-test.js"></script>
  </body>
</html>
